<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random-Quotes</title>
    <link rel="stylesheet" href="./CSS/styles.css" />
    <link rel="stylesheet" href="./CSS/favorites.css" />
  </head>
  <body>
    <div class="dark-btn-container">
      <button id="theme-toggle" class="darckMode-btn toggle">
        <span class="icon sun">☀️</span>
        <span class="icon moon">🌙</span>
        <span class="ball"></span>
      </button>
    </div>

    <div class="container">
      <h1>Random Quotes</h1>
      <h3 id="author" class="author">Some says...</h3>
      <p id="quote">Click the button to ged a random quote</p>
      <button id="favorite-btn" class="favorite-btn">
        <div class="heart-emoji">
          <span id="heart">🖤</span>
        </div>
        <div id="fav-btn" class="btn-fav-text">Add to favorite</div>
      </button>
      <button id="generate-btn" class="main-btn">Generate Quote</button>
    </div>

    <div id="favs" class="fav-container">
      <img
        id="tumbleweed"
        class="tumbleweedGif"
        src="./tumbleweed.gif"
        alt="tumbleweed"
      />
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
